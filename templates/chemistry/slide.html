<div class="slide" id="slide-{index}">
    <svg class="slide-bg-pattern" viewBox="0 0 1920 200" preserveAspectRatio="none">
        <defs>
            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
                <stop offset="100%" style="stop-color:#e8edf2;stop-opacity:1" />
            </linearGradient>
        </defs>
        <rect fill="url(#bgGrad)" width="1920" height="200" />
        <g stroke="#c5d0dc" stroke-width="1.5" fill="none" opacity="0.6">
            <line x1="200" y1="50" x2="350" y2="80" />
            <line x1="350" y1="80" x2="500" y2="40" />
            <line x1="350" y1="80" x2="400" y2="150" />
            <line x1="500" y1="40" x2="650" y2="90" />
            <line x1="650" y1="90" x2="750" y2="170" />
            <line x1="650" y1="90" x2="800" y2="50" />
            <line x1="800" y1="50" x2="950" y2="120" />
            <line x1="950" y1="120" x2="1100" y2="70" />
            <line x1="950" y1="120" x2="1050" y2="180" />
            <line x1="1100" y1="70" x2="1250" y2="130" />
            <line x1="1250" y1="130" x2="1400" y2="60" />
            <line x1="1250" y1="130" x2="1350" y2="190" />
            <line x1="1400" y1="60" x2="1550" y2="110" />
            <line x1="1550" y1="110" x2="1700" y2="40" />
            <line x1="1550" y1="110" x2="1700" y2="160" />
        </g>
        <g fill="#c55a11" opacity="0.7">
            <circle cx="200" cy="50" r="8" />
            <circle cx="350" cy="80" r="10" />
            <circle cx="500" cy="40" r="7" />
            <circle cx="400" cy="150" r="6" />
            <circle cx="650" cy="90" r="9" />
            <circle cx="750" cy="170" r="6" />
            <circle cx="800" cy="50" r="8" />
            <circle cx="950" cy="120" r="10" />
            <circle cx="1100" cy="70" r="7" />
            <circle cx="1050" cy="180" r="6" />
            <circle cx="1250" cy="130" r="9" />
            <circle cx="1400" cy="60" r="8" />
            <circle cx="1350" cy="190" r="6" />
            <circle cx="1550" cy="110" r="10" />
            <circle cx="1700" cy="40" r="7" />
            <circle cx="1700" cy="160" r="6" />
        </g>
    </svg>
    
    <div class="slide-header">
        <div class="main-title-bar">
            <div class="main-title">{title}</div>
        </div>
        <div class="sub-title-bar">
            <div class="sub-title-dot"></div>
            <div class="sub-title">{subtitle}</div>
        </div>
        <div class="school-logo-area">
            <img src="校徽.jpeg" alt="校徽" class="school-logo">
            <div class="school-name">四川化工职业技术学院</div>
        </div>
    </div>
    
    <div class="slide-content">
        {content}
    </div>
    
    <div class="slide-footer">
        {index} / {total}
    </div>
</div>
