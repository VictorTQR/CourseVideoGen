<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{title}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Georgia", "Microsoft YaHei", serif;
            background: linear-gradient(180deg, {bg_color} 0%, #f8f9fa 100%);
        }
        .slide {
            width: 1920px;
            height: 1080px;
            padding: 80px 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: transparent;
            position: relative;
        }
        .slide::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, {accent_color}, transparent);
        }
        .slide-title {
            font-size: 72px;
            font-weight: 700;
            color: {text_color};
            margin-bottom: 32px;
            text-align: center;
            letter-spacing: 2px;
        }
        .slide-subtitle {
            font-size: 36px;
            color: {text_color};
            opacity: 0.7;
            margin-bottom: 60px;
            text-align: center;
            font-style: italic;
        }
        .slide-content {
            font-size: 32px;
            color: {text_color};
            line-height: 2;
        }
        .slide-content ul {
            padding-left: 80px;
            list-style: none;
        }
        .slide-content li {
            margin-bottom: 24px;
            padding-left: 40px;
            position: relative;
        }
        .slide-content li::before {
            content: "★";
            position: absolute;
            left: 0;
            color: {accent_color};
        }
        .slide-footer {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 24px;
            color: {text_color};
            opacity: 0.5;
        }
    </style>
</head>
<body>
    {slides_html}
</body>
</html>
